<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanceIQ</title>
    <meta
      name="description"
      content="FinanceIQ is a polished finance dashboard for tracking balances, transactions, spending patterns, and actionable financial insights."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FinanceIQ" />
    <meta property="og:title" content="FinanceIQ" />
    <meta
      property="og:description"
      content="Track balances, explore transactions, and understand spending patterns with FinanceIQ."
    />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FinanceIQ" />
    <meta
      name="twitter:description"
      content="Track balances, explore transactions, and understand spending patterns with FinanceIQ."
    />
    <meta name="twitter:image" content="/favicon.svg" />
    <script>
      (function() {
        try {
          const store = localStorage.getItem('finance-store');
          if (store) {
            const parsed = JSON.parse(store);
            const theme = parsed?.state?.theme;
            if (theme === 'dark') {
              document.documentElement.classList.add('dark');
            }
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
